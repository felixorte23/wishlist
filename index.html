<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amalia's Wishlist 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #F9EDE8;
    --blush-mid: #F2D8CE;
    --blush-deep: #E8B9A8;
    --sage: #D4E4D8;
    --sage-deep: #8FAF97;
    --cream: #FDF8F4;
    --warm-white: #FFFAF7;
    --text-dark: #3D2B24;
    --text-mid: #7A5C52;
    --text-light: #B8998F;
    --accent: #C17A65;
    --blocked-bg: #F0EEEB;
    --blocked-text: #B0A8A4;
    --available-bg: #EBF3ED;
    --available-text: #4A7D5A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    background-image: 
      radial-gradient(circle at 15% 20%, rgba(249,237,232,0.8) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(212,228,216,0.6) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(253,248,244,1) 0%, transparent 80%);
  }

  /* Decorative dots pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(193,122,101,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 52px;
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-sub {
    font-size: 15px;
    color: var(--text-mid);
    font-weight: 300;
    margin-top: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px auto;
    max-width: 200px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--blush-deep);
    opacity: 0.5;
  }

  .divider-icon {
    font-size: 16px;
  }

  /* Name input banner */
  .name-banner {
    background: var(--warm-white);
    border: 1.5px solid var(--blush-mid);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    transition: border-color 0.2s;
  }

  .name-banner:focus-within {
    border-color: var(--accent);
  }

  .name-banner-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .name-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--text-dark);
    outline: none;
  }

  .name-input::placeholder {
    color: var(--text-light);
    font-style: italic;
  }

  .name-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blush);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  /* Progress summary */
  .progress-bar-wrap {
    margin-bottom: 40px;
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--blush-mid);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--blush-deep));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Cards */
  .items-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .item-card {
    background: var(--warm-white);
    border: 1.5px solid var(--blush-mid);
    border-radius: 20px;
    padding: 22px 24px;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .item-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--blush-deep);
    border-radius: 4px 0 0 4px;
    transition: background 0.2s;
  }

  .item-card:not(.blocked):hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(193,122,101,0.1);
    border-color: var(--accent);
  }

  .item-card:not(.blocked):hover::before {
    background: var(--accent);
  }

  .item-card.blocked {
    background: var(--blocked-bg);
    border-color: #DDD8D4;
    opacity: 0.85;
  }

  .item-card.blocked::before {
    background: #C8C4C0;
  }

  .item-card.completed {
    background: #F0F6F1;
    border-color: #B8D4BE;
  }

  .item-card.completed::before {
    background: var(--sage-deep);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card-left { flex: 1; }

  .item-name {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .blocked .item-name {
    color: var(--blocked-text);
  }

  .item-qty-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qty-label {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .qty-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--blush);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .qty-fill-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .qty-fill-pill.available {
    background: var(--available-bg);
    color: var(--available-text);
  }

  .qty-fill-pill.full {
    background: #F0EEEB;
    color: #999;
  }

  /* Status badge top-right */
  .status-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }

  .status-badge.open {
    background: var(--available-bg);
    color: var(--available-text);
  }

  .status-badge.partial {
    background: #FEF4E4;
    color: #B07D2A;
  }

  .status-badge.full {
    background: var(--blocked-bg);
    color: var(--blocked-text);
  }

  /* Selectors list */
  .selectors-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 28px;
  }

  .selector-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
  }

  .selector-chip.mine {
    background: var(--blush);
    color: var(--accent);
    border: 1px solid var(--blush-deep);
  }

  .selector-chip.other {
    background: var(--sage);
    color: #4D7A5A;
    border: 1px solid var(--sage-deep);
  }

  .selector-chip .remove-btn {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: var(--accent);
    background: none;
    border: none;
    padding: 0;
    display: flex;
    align-items: center;
  }

  .selector-chip .remove-btn:hover { opacity: 0.7; }

  /* Links */
  .links-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border: 1px solid var(--blush-deep);
    border-radius: 8px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--warm-white);
    transition: background 0.15s, border-color 0.15s;
  }

  .link-btn:hover {
    background: var(--blush);
    border-color: var(--accent);
  }

  .link-icon {
    font-size: 12px;
  }

  /* Action area */
  .action-area {
    border-top: 1px solid var(--blush-mid);
    padding-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .blocked .action-area {
    border-top-color: #DDD8D4;
  }

  .select-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    letter-spacing: 0.02em;
  }

  .select-btn:active { transform: scale(0.97); }

  .select-btn.primary {
    background: var(--accent);
    color: white;
  }

  .select-btn.primary:hover { opacity: 0.88; }

  .select-btn.deselect {
    background: var(--blush);
    color: var(--accent);
    border: 1px solid var(--blush-deep);
  }

  .select-btn.deselect:hover { opacity: 0.8; }

  .select-btn.disabled {
    background: #EDEAE7;
    color: var(--blocked-text);
    cursor: not-allowed;
  }

  .no-name-msg {
    font-size: 12px;
    color: var(--text-light);
    font-style: italic;
  }

  /* Locked overlay text */
  .locked-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--blocked-text);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 56px;
    font-size: 12px;
    color: var(--text-light);
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 400;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 500px) {
    .card-top { flex-direction: column; gap: 8px; }
    .action-area { flex-direction: column; align-items: stretch; }
    .select-btn { text-align: center; width: 100%; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header">
    <p class="header-eyebrow">Lista de regalos</p>
    <h1><em>Amalia's</em> Wishlist</h1>
    <p class="header-sub">Elige un regalo para la bebé · Cada artículo tiene cupo limitado</p>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">🌸</span>
      <span class="divider-line"></span>
    </div>
  </header>

  <!-- Name input -->
  <div class="name-banner" id="nameBanner">
    <span class="name-banner-label">Tu nombre:</span>
    <input
      type="text"
      class="name-input"
      id="nameInput"
      placeholder="Escribe tu nombre aquí…"
      maxlength="40"
      autocomplete="off"
    />
    <span class="name-badge" id="nameBadge" style="display:none">
      <span>👋</span>
      <span id="nameBadgeText"></span>
    </span>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-stats">
      <span id="progressLabel">Cargando lista…</span>
      <span>
        <span id="connStatus" style="font-size:11px;margin-right:10px;">⚪ Conectando…</span>
        <span id="progressPct">0%</span>
      </span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Items grid -->
  <div class="items-grid" id="itemsGrid"></div>

  <footer class="footer">
    <p>Hecho con 💕 para Amalia · Sincronizado en tiempo real para todos</p>
  </footer>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDKs (compat mode, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAcSUo473okD8TRtR-7YD_mCL7hJ--zltI",
  authDomain: "listproducts-41b70.firebaseapp.com",
  databaseURL: "https://listproducts-41b70-default-rtdb.firebaseio.com",
  projectId: "listproducts-41b70",
  storageBucket: "listproducts-41b70.firebasestorage.app",
  messagingSenderId: "804202769829",
  appId: "1:804202769829:web:9f01be9c78437c2c698c4c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const wishlistRef = db.ref('wishlist');
const connectedRef = db.ref('.info/connected');

// ============================================================
// LISTA DE PRODUCTOS — edita aquí para actualizar la wishlist
// ============================================================
const WISHLIST = [
  {
    id: "panales",
    name: "Pacas de pañales",
    qty: 3,
    links: [
      { label: "Amazon", url: "https://www.amazon.com.co" },
      { label: "Jumbo", url: "https://www.tiendasjumbo.co" },
      { label: "Éxito", url: "https://www.exito.com" }
    ]
  },
  {
    id: "toallas_humedas",
    name: "Toallas húmedas",
    qty: 2,
    links: [
      { label: "Amazon", url: "https://www.amazon.com.co" },
      { label: "Éxito", url: "https://www.exito.com" }
    ]
  },
  {
    id: "mameluco",
    name: "Mameluco newborn (0-3m)",
    qty: 5,
    links: [
      { label: "Zara Kids", url: "https://www.zara.com/co" }
    ]
  },
  {
    id: "cuna_portatil",
    name: "Cuna portátil",
    qty: 1,
    links: [
      { label: "Amazon", url: "https://www.amazon.com.co" },
      { label: "Bebé Moda", url: "https://www.bebemoda.com.co" }
    ]
  },
  {
    id: "cobija",
    name: "Cobija swaddle",
    qty: 4,
    links: [
      { label: "Amazon", url: "https://www.amazon.com.co" },
      { label: "Éxito", url: "https://www.exito.com" },
      { label: "Falabella", url: "https://www.falabella.com.co" }
    ]
  }
];

// ============================================================
// STATE — sincronizado en tiempo real vía Firebase
// ============================================================
// Estructura en Firebase:
//   /wishlist/{itemId} = ["Nombre1", "Nombre2", ...]
// Solo se guardan items con selecciones; un item ausente = vacío.

let state = {};
WISHLIST.forEach(item => { state[item.id] = []; });

let myName = '';
let isConnected = false;
let initialLoad = true;

// Listener en tiempo real: cuando alguien (yo u otro) cambia algo,
// esta función se dispara y re-renderiza.
wishlistRef.on('value', snapshot => {
  const data = snapshot.val() || {};
  // Reconstruir state respetando el orden de WISHLIST
  WISHLIST.forEach(item => {
    state[item.id] = Array.isArray(data[item.id]) ? data[item.id] : [];
  });
  render();
  initialLoad = false;
}, err => {
  console.error('Firebase read error:', err);
  showToast('⚠️ Error al cargar la lista');
});

// Indicador de conexión
connectedRef.on('value', snap => {
  isConnected = snap.val() === true;
  updateConnectionBadge();
});

function updateConnectionBadge() {
  const el = document.getElementById('connStatus');
  if (!el) return;
  if (isConnected) {
    el.textContent = '🟢 Sincronizado';
    el.style.color = 'var(--available-text)';
  } else {
    el.textContent = '🔴 Sin conexión';
    el.style.color = '#B87A5A';
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const grid = document.getElementById('itemsGrid');
  grid.innerHTML = '';

  let totalSlots = 0, filledSlots = 0;

  WISHLIST.forEach(item => {
    const selectors = state[item.id] || [];
    const filled = selectors.length;
    const isFull = filled >= item.qty;
    const iSelectedIt = myName && selectors.includes(myName);

    totalSlots += item.qty;
    filledSlots += Math.min(filled, item.qty);

    const card = document.createElement('div');
    card.className = 'item-card' + (isFull ? ' blocked completed' : '');

    // --- Status badge ---
    let badgeClass = 'open', badgeText = 'Disponible';
    if (isFull) { badgeClass = 'full'; badgeText = '¡Completo!'; }
    else if (filled > 0) { badgeClass = 'partial'; badgeText = `${filled} / ${item.qty} tomados`; }

    // --- Slots mini-dots ---
    let dots = '';
    for (let i = 0; i < item.qty; i++) {
      const taken = i < filled;
      dots += `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;background:${taken ? 'var(--accent)' : 'var(--blush-mid)'};vertical-align:middle;"></span>`;
    }

    // --- Selector chips ---
    let chipsHTML = '';
    selectors.forEach(name => {
      const isMine = (name === myName);
      const removeBtn = isMine
        ? `<button class="remove-btn" data-id="${item.id}" title="Quitar mi selección">×</button>`
        : '';
      chipsHTML += `<span class="selector-chip ${isMine ? 'mine' : 'other'}">
        ${isMine ? '👤' : '🌸'} ${escHtml(name)}${removeBtn}
      </span>`;
    });
    if (!chipsHTML) chipsHTML = `<span style="font-size:13px;color:var(--text-light);font-style:italic;">Nadie lo ha seleccionado aún</span>`;

    // --- Links ---
    let linksHTML = item.links.map((l, idx) =>
      `<a class="link-btn" href="${l.url}" target="_blank" rel="noopener">
        <span class="link-icon">🔗</span> ${escHtml(l.label)}
       </a>`
    ).join('');

    // --- Action ---
    let actionHTML = '';
    if (iSelectedIt) {
      actionHTML = `<button class="select-btn deselect" data-id="${item.id}">× Quitar mi selección</button>`;
    } else if (isFull) {
      actionHTML = `<span class="locked-label">🔒 Cupo completo (${item.qty} personas)</span>`;
    } else if (!myName) {
      actionHTML = `<span class="no-name-msg">Escribe tu nombre arriba para seleccionar</span>`;
    } else {
      actionHTML = `<button class="select-btn primary" data-id="${item.id}">🎁 Yo lo regalo</button>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <p class="item-name">${escHtml(item.name)}</p>
          <div class="item-qty-row">
            <span class="qty-label">Cantidad:</span>
            <span class="qty-pill">✦ ${item.qty}</span>
            <span>${dots}</span>
            <span class="qty-fill-pill ${isFull ? 'full' : 'available'}">
              ${isFull ? '✓ Completo' : `${item.qty - filled} disponible${item.qty - filled !== 1 ? 's' : ''}`}
            </span>
          </div>
        </div>
        <span class="status-badge ${badgeClass}">${badgeText}</span>
      </div>

      <div class="selectors-list">${chipsHTML}</div>

      ${item.links.length ? `<div class="links-row">${linksHTML}</div>` : ''}

      <div class="action-area">${actionHTML}</div>
    `;

    grid.appendChild(card);
  });

  // Progress bar
  const pct = totalSlots > 0 ? Math.round((filledSlots / totalSlots) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${filledSlots} de ${totalSlots} cupos reservados`;

  // Bind buttons
  document.querySelectorAll('.select-btn.primary').forEach(btn => {
    btn.addEventListener('click', () => selectItem(btn.dataset.id));
  });
  document.querySelectorAll('.select-btn.deselect').forEach(btn => {
    btn.addEventListener('click', () => deselectItem(btn.dataset.id));
  });
  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deselectItem(btn.dataset.id);
    });
  });
}

// ============================================================
// ACTIONS — usan transacciones para evitar race conditions
// ============================================================
function selectItem(id) {
  if (!myName) { showToast('✏️ Escribe tu nombre primero'); return; }
  if (!isConnected) { showToast('⚠️ Sin conexión, intenta de nuevo'); return; }
  const item = WISHLIST.find(i => i.id === id);
  if (!item) return;

  const itemRef = wishlistRef.child(id);
  itemRef.transaction(current => {
    const arr = Array.isArray(current) ? current : [];
    if (arr.includes(myName)) return arr;           // ya estaba
    if (arr.length >= item.qty) return;             // abort: cupo lleno
    return [...arr, myName];
  }, (err, committed, snapshot) => {
    if (err) {
      showToast('⚠️ Error al guardar, intenta de nuevo');
      return;
    }
    if (!committed) {
      showToast('Cupo completo, alguien se adelantó 😅');
      return;
    }
    const finalArr = snapshot.val() || [];
    if (finalArr.includes(myName) && finalArr.length <= item.qty) {
      showToast(`🎁 ¡Genial! Reservaste "${item.name}"`);
    }
  });
}

function deselectItem(id) {
  if (!myName) return;
  const itemRef = wishlistRef.child(id);
  itemRef.transaction(current => {
    const arr = Array.isArray(current) ? current : [];
    const filtered = arr.filter(n => n !== myName);
    return filtered.length ? filtered : null;       // null = borra el nodo
  }, (err) => {
    if (err) { showToast('⚠️ Error al quitar, intenta de nuevo'); return; }
    const item = WISHLIST.find(i => i.id === id);
    showToast(`Quitaste tu selección de "${item ? item.name : id}"`);
  });
}

// ============================================================
// NAME INPUT
// ============================================================
const nameInput = document.getElementById('nameInput');
const nameBadge = document.getElementById('nameBadge');
const nameBadgeText = document.getElementById('nameBadgeText');

// Restore saved name
const savedName = localStorage.getItem('amalia_user_name') || '';
if (savedName) {
  myName = savedName;
  nameInput.value = savedName;
  showNameBadge(savedName);
}

nameInput.addEventListener('input', () => {
  myName = nameInput.value.trim();
  localStorage.setItem('amalia_user_name', myName);
  if (myName) {
    showNameBadge(myName);
  } else {
    nameBadge.style.display = 'none';
    nameInput.style.display = '';
  }
  render();
});

function showNameBadge(name) {
  nameBadgeText.textContent = name;
  nameBadge.style.display = 'inline-flex';
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Primer render con estado vacío mientras llega la data de Firebase.
// Después el listener wishlistRef.on('value', ...) se encarga.
render();
updateConnectionBadge();
</script>
